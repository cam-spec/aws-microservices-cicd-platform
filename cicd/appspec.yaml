# customer-service (port 3000). employee-service: appspec-employee.yaml (one TargetService per AppSpec).
version: 0.0

Resources:
  - TargetService:
      Type: AWS::ECS::Service
      Properties:
        TaskDefinition: "<CUSTOMER_SERVICE_TASK_DEFINITION_ARN>"
        LoadBalancerInfo:
          ContainerName: "customer-service"
          ContainerPort: 3000