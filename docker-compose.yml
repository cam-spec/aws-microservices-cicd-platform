services:
  customer-service:
    build: ./services/customer-service
    container_name: customer-container
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', (r) => { r.resume(); process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  employee-service:
    build: ./services/employee-service
    container_name: employee-container
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', (r) => { r.resume(); process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
